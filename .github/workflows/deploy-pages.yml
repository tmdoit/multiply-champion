name: Deploy PWA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_TASK_COUNT: ${{ vars.VITE_TASK_COUNT }}
          VITE_DEFAULT_MODE_CODE: ${{ vars.VITE_DEFAULT_MODE_CODE }}
          VITE_TIMER_ENABLED: ${{ vars.VITE_TIMER_ENABLED }}
          VITE_TIMER_SECONDS_PER_TASK: ${{ vars.VITE_TIMER_SECONDS_PER_TASK }}
          VITE_INVITE_EXPIRATION_HOURS: ${{ vars.VITE_INVITE_EXPIRATION_HOURS }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
